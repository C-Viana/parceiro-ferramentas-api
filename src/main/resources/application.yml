spring:
    application:
        name: parceiro_api
    datasource:
        name: parceirodb
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:5432/parceirodb
        username: postgres
        password: 1234
    jpa:
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                ddl-auto: none
logging:
    charset:
        console: UTF-8
    level:
        root: INFO